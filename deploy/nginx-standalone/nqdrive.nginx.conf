# ============================================================================
# NQDRIVE — Nginx standalone (tanpa Docker) untuk VPS
#
# Meniru logic proxy apps/web/functions/[[catchall]].ts (looksLikeDownloadPath):
#   - /download/, /public/folder/           -> selalu proxy ke worker
#   - / , /dashboard*, /login*, /s/*,
#     /folder/*, /assets/*                  -> BUKAN download (SPA/static)
#   - segmen pertama tepat 23 karakter
#     dan path punya >= 2 segmen            -> proxy ke worker
#   - segmen terakhir punya ekstensi file   -> proxy ke worker
#   - kalau worker balas 404                -> fallback ke SPA (index.html)
#   - /api/  -> proxy SEMUA path (TANPA whitelist dashboardPaths sempit —
#     backend punya /api/upload, /api/security, /api/audit-logs yang tidak
#     ada di whitelist itu; index.ts sudah punya guard sendiri)
#   - /config, /captcha, /resource/, /system/ -> juga endpoint worker: web app
#     memanggilnya langsung (login page, share page) saat VITE_WORKER_URL kosong
#
# Ganti: server_name, path root (dist hasil `pnpm build:web`), path sertifikat.
# ============================================================================

# Upstream worker Node (systemd service nqdrive-worker, port dari .env)
upstream nqdrive_worker {
    server 127.0.0.1:8787;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name drive.example.com;

    # Untuk penerbitan/renewal sertifikat certbot (webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name drive.example.com;

    # Sertifikat dari certbot (lihat deploy/README.md)
    ssl_certificate     /etc/letsencrypt/live/drive.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drive.example.com/privkey.pem;

    # Hasil build frontend: pnpm build:web  ->  apps/web/dist
    root /opt/nqdrive/apps/web/dist;
    index index.html;

    # Upload/download file besar lewat worker
    client_max_body_size 0;

    # ------------------------------------------------------------------
    # Blok reusable: setting proxy ke worker.
    # proxy_buffering off      -> streaming download langsung ke client
    #                             (wajib untuk resumable/Range request)
    # proxy_request_buffering off -> streaming upload langsung ke worker
    # ------------------------------------------------------------------

    # === PATH YANG PASTI BUKAN DOWNLOAD (SPA & static) =================

    # Static asset Vite — hash di nama file, aman immutable
    location ^~ /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ^~ /dashboard { try_files $uri /index.html; }
    location ^~ /login     { try_files $uri /index.html; }
    location ^~ /s/        { try_files $uri /index.html; }
    location ^~ /folder/   { try_files $uri /index.html; }

    # === ENDPOINT WORKER ===============================================

    # /api/ -> SEMUA path diproxy (tanpa whitelist sempit).
    location ^~ /api/ {
        proxy_pass http://nqdrive_worker;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Endpoint worker non-/api yang dipanggil langsung oleh web app
    # (login page: /config /captcha; share page: /resource/...; auth: /system/state)
    location = /config   { proxy_pass http://nqdrive_worker; include /etc/nginx/snippets/nqdrive-proxy.conf; }
    location ^~ /captcha  { proxy_pass http://nqdrive_worker; include /etc/nginx/snippets/nqdrive-proxy.conf; }
    location ^~ /resource/ { proxy_pass http://nqdrive_worker; include /etc/nginx/snippets/nqdrive-proxy.conf; }
    location ^~ /system/  { proxy_pass http://nqdrive_worker; include /etc/nginx/snippets/nqdrive-proxy.conf; }

    # === PATH DOWNLOAD (worker dulu, 404 -> SPA fallback) ==============

    # /download/... -> selalu dianggap download
    location ^~ /download/ {
        proxy_pass http://nqdrive_worker;
        include /etc/nginx/snippets/nqdrive-proxy.conf;
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
    }

    # /public/folder/... -> download folder publik
    location ^~ /public/folder/ {
        proxy_pass http://nqdrive_worker;
        include /etc/nginx/snippets/nqdrive-proxy.conf;
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
    }

    # Segmen pertama tepat 23 karakter + minimal 2 segmen (shareCode/slug)
    location ~ "^/[^/]{23}/." {
        proxy_pass http://nqdrive_worker;
        include /etc/nginx/snippets/nqdrive-proxy.conf;
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
    }

    # Segmen terakhir punya ekstensi (titik bukan karakter pertama/terakhir).
    # Static asset root (favicon.ico dll) dicoba dari disk dulu, baru worker.
    location ~ "^/(?:.*/)?[^/.][^/]*\.[^/.]+$" {
        try_files $uri @worker_then_spa;
    }

    location @worker_then_spa {
        proxy_pass http://nqdrive_worker;
        include /etc/nginx/snippets/nqdrive-proxy.conf;
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
    }

    # === SISANYA: SPA fallback =========================================

    location / {
        try_files $uri $uri/ /index.html;
    }

    location @spa_fallback {
        # Worker balas 404 -> serve SPA (halaman React yang menampilkan not-found)
        try_files /index.html =404;
    }
}

# ============================================================================
# Simpan snippet berikut sebagai /etc/nginx/snippets/nqdrive-proxy.conf
# (dipakai `include` di atas supaya setting proxy tidak diulang-ulang):
#
#   proxy_http_version 1.1;
#   proxy_set_header Connection "";
#   proxy_set_header Host $host;
#   proxy_set_header X-Real-IP $remote_addr;
#   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#   proxy_set_header X-Forwarded-Proto $scheme;
#   proxy_buffering off;
#   proxy_request_buffering off;
#   proxy_read_timeout 3600s;
#   proxy_send_timeout 3600s;
# ============================================================================
