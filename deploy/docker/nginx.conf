# ============================================================================
# NQDRIVE — nginx reverse proxy untuk docker-compose.
# Pola routing SAMA PERSIS dengan deploy/nginx-standalone/nqdrive.nginx.conf
# (turunan looksLikeDownloadPath di apps/web/functions/[[catchall]].ts),
# bedanya upstream: worker -> worker:8787, static/SPA -> web:80.
# /api/ diproxy SEMUA path — TANPA whitelist dashboardPaths sempit.
# ============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    upstream nqdrive_worker {
        server worker:8787;
        keepalive 16;
    }

    upstream nqdrive_web {
        server web:80;
        keepalive 16;
    }

    server {
        listen 80;
        server_name drive.example.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name drive.example.com;

        ssl_certificate     /etc/letsencrypt/live/drive.example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/drive.example.com/privkey.pem;

        client_max_body_size 0;

        # === PATH YANG PASTI BUKAN DOWNLOAD (SPA & static via container web) ===

        location ^~ /assets/   { proxy_pass http://nqdrive_web; }
        location ^~ /dashboard { proxy_pass http://nqdrive_web; }
        location ^~ /login     { proxy_pass http://nqdrive_web; }
        location ^~ /s/        { proxy_pass http://nqdrive_web; }
        location ^~ /folder/   { proxy_pass http://nqdrive_web; }

        # === ENDPOINT WORKER =============================================

        # /api/ -> SEMUA path (tanpa whitelist sempit)
        location ^~ /api/ {
            proxy_pass http://nqdrive_worker;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Endpoint worker non-/api yang dipanggil langsung web app
        location = /config {
            proxy_pass http://nqdrive_worker;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }
        location ^~ /captcha {
            proxy_pass http://nqdrive_worker;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }
        location ^~ /resource/ {
            proxy_pass http://nqdrive_worker;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }
        location ^~ /system/ {
            proxy_pass http://nqdrive_worker;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        # === PATH DOWNLOAD (worker dulu, 404 -> SPA fallback) ============

        location ^~ /download/ {
            proxy_pass http://nqdrive_worker;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_intercept_errors on;
            error_page 404 = @spa_fallback;
        }

        location ^~ /public/folder/ {
            proxy_pass http://nqdrive_worker;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_intercept_errors on;
            error_page 404 = @spa_fallback;
        }

        # Segmen pertama tepat 23 karakter + minimal 2 segmen (shareCode/slug)
        location ~ "^/[^/]{23}/." {
            proxy_pass http://nqdrive_worker;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_intercept_errors on;
            error_page 404 = @spa_fallback;
        }

        # Segmen terakhir punya ekstensi (titik bukan karakter pertama/terakhir)
        location ~ "^/(?:.*/)?[^/.][^/]*\.[^/.]+$" {
            proxy_pass http://nqdrive_worker;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_intercept_errors on;
            error_page 404 = @spa_fallback;
        }

        # === SISANYA: SPA (container web) ================================

        location / {
            proxy_pass http://nqdrive_web;
            proxy_set_header Host $host;
        }

        location @spa_fallback {
            # Worker balas 404 -> serve SPA dari container web.
            # rewrite supaya container web mengembalikan index.html
            # (path aslinya file yang tidak ada di dist).
            rewrite ^ /index.html break;
            proxy_pass http://nqdrive_web;
            proxy_set_header Host $host;
        }
    }
}
