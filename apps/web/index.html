<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>%VITE_SITE_NAME% — Secure Cloud Storage</title>
    <meta name="description" content="A powerful unified cloud storage manager." />
    <meta property="og:title" content="Unified Cloud Storage Platform" />
    <meta property="og:description" content="Manage and expand your storage capacity by connecting multiple cloud accounts seamlessly." />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <style>
      /* Critical loader — paling minimal, jangan pakai contain / content-visibility / translateZ di keyframes */
      #app-loader{
        position:fixed;inset:0;z-index:99999;
        display:flex;align-items:center;justify-content:center;
        background:#f4f6f8;
      }
      @media(prefers-color-scheme:dark){ #app-loader{background:#09090b} }
      .app-loader-spinner{
        width:40px;height:40px;
        border:3px solid rgba(16,185,129,.2);
        border-top-color:#10b981;
        border-radius:50%;
        will-change:transform;
        animation:app-loader-spin .8s linear infinite;
      }
      @keyframes app-loader-spin{
        from{transform:rotate(0deg)}
        to{transform:rotate(360deg)}
      }
      @media(prefers-reduced-motion:reduce){
        .app-loader-spinner{animation:app-loader-spin .8s linear infinite !important}
      }
      #app-loader.app-loader--hide{
        opacity:0;pointer-events:none;transition:opacity .22s ease;
      }
    </style>
  </head>
  <body>
    <div id="app-loader"><div class="app-loader-spinner"></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
